<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Timetable — UPSC Prep</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=300;400;500;600;700&family=JetBrains+Mono:wght=400;600&display=swap');

  /* ── THEMES ── */
  :root {
    --bg:         #0f1c2e;
    --bg-mid:     #1a2e48;
    --bg-light:   #243d5c;
    --accent:     #e8a020;
    --accent-dim: #c4881a;
    --text:       #f5f0e8;
    --muted:      --muted;
    --white:      #ffffff;
    --border:     rgba(255,255,255,0.08);
    --border-h:   rgba(255,255,255,0.07);
    --progress-track: rgba(255,255,255,0.08);
    --ring-track: rgba(255,255,255,0.1);
    --card-hover: rgba(255,255,255,0.03);
  }

  [data-theme="forest"] {
    --bg:         #0d1f17;
    --bg-mid:     #162b1e;
    --bg-light:   #1f3a28;
    --accent:     #5cbe7a;
    --accent-dim: #42a360;
    --text:       #e8f2eb;
    --muted:      #7aaa8a;
    --white:      #f0faf3;
    --border:     rgba(92,190,122,0.12);
    --border-h:   rgba(92,190,122,0.07);
    --progress-track: rgba(92,190,122,0.1);
    --ring-track: rgba(92,190,122,0.15);
    --card-hover: rgba(92,190,122,0.03);
  }

  [data-theme="parchment"] {
    --bg:         #f0e8d8;
    --bg-mid:     #e6dcc8;
    --bg-light:   #ddd0b8;
    --accent:     #8b4513;
    --accent-dim: #6b3410;
    --text:       #2a1a0a;
    --muted:      #7a6450;
    --white:      #2a1a0a;
    --border:     rgba(100,60,20,0.15);
    --border-h:   rgba(100,60,20,0.1);
    --progress-track: rgba(100,60,20,0.12);
    --ring-track: rgba(100,60,20,0.15);
    --card-hover: rgba(100,60,20,0.04);
  }

  [data-theme="slate"] {
    --bg:         #1a1e26;
    --bg-mid:     #242935;
    --bg-light:   #2e3545;
    --accent:     #7eb8d4;
    --accent-dim: #5a9ab8;
    --text:       #e2e8f0;
    --muted:      #7a8fa8;
    --white:      #f8fafc;
    --border:     rgba(126,184,212,0.1);
    --border-h:   rgba(126,184,212,0.07);
    --progress-track: rgba(126,184,212,0.1);
    --ring-track: rgba(126,184,212,0.12);
    --card-hover: rgba(126,184,212,0.03);
  }

  [data-theme="plum"] {
    --bg:         #1a0f2e;
    --bg-mid:     #261a3f;
    --bg-light:   #332550;
    --accent:     #c084e8;
    --accent-dim: #a060cc;
    --text:       #f0e8ff;
    --muted:      #9878b8;
    --white:      #faf5ff;
    --border:     rgba(192,132,232,0.12);
    --border-h:   rgba(192,132,232,0.07);
    --progress-track: rgba(192,132,232,0.1);
    --ring-track: rgba(192,132,232,0.15);
    --card-hover: rgba(192,132,232,0.03);
  }

  [data-theme="desert"] {
    --bg:         #1e160c;
    --bg-mid:     #2c2014;
    --bg-light:   #3a2c1c;
    --accent:     #d4914a;
    --accent-dim: #b87030;
    --text:       #f5ece0;
    --muted:      #a08060;
    --white:      #fff8f0;
    --border:     rgba(212,145,74,0.12);
    --border-h:   rgba(212,145,74,0.07);
    --progress-track: rgba(212,145,74,0.1);
    --ring-track: rgba(212,145,74,0.15);
    --card-hover: rgba(212,145,74,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg);
    padding: 24px 32px 0;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    border-bottom: 1px solid var(--border-h);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-text h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--white);
  }
  .header-text p {
    color: #8ca0b8;
    font-size: 0.82rem;
    margin-top: 3px;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .day-tab {
    background: none;
    border: none;
    color: #8ca0b8;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 13px 12px;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .day-tab:hover { color: var(--white); }
  .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .day-tab.today { font-weight: 700; }

  /* Theme switcher button */
  .theme-btn {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    color: #8ca0b8;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    margin-bottom: 12px;
    align-self: flex-end;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Theme panel */
  .theme-panel {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
  }
  .theme-panel.open { display: flex; }
  .theme-modal {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: min(440px, 92vw);
  }
  .theme-modal h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .theme-modal p {
    font-size: 0.78rem;
    color: #8ca0b8;
    margin-bottom: 20px;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .theme-swatch {
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 12px 10px 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start;
  }
  .theme-swatch:hover { transform: translateY(-2px); }
  .theme-swatch.active { border-color: var(--accent); }
  .swatch-dots {
    display: flex;
    gap: 4px;
  }
  .swatch-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .theme-close {
    width: 100%;
    padding: 10px;
    background: var(--bg-light);
    border: 1px solid var(--border);
    color: #8ca0b8;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .theme-close:hover { color: var(--text); }

  /* ── MAIN ── */
  main { padding: 24px 32px 48px; max-width: 1200px; margin: 0 auto; }

  /* ── DAY OVERVIEW ── */
  .day-overview {
    display: flex;
    align-items: center;
    gap: 28px;
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 28px;
    margin-bottom: 24px;
  }

  .ring-wrap {
    position: relative;
    width: 88px; height: 88px;
    flex-shrink: 0;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--ring-track); stroke-width: 7; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }
  .ring-label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem; font-weight: 600;
    color: var(--white); line-height: 1;
  }
  .ring-sub {
    font-size: 0.58rem; color: #8ca0b8;
    margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .day-overview-info h2 { font-size: 1.2rem; font-weight: 700; color: var(--white); }
  .day-overview-info > p { color: #8ca0b8; font-size: 0.82rem; margin-top: 3px; }

  .day-stats { display: flex; gap: 22px; margin-top: 12px; flex-wrap: wrap; }
  .day-stat { display: flex; flex-direction: column; gap: 2px; }
  .day-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem; font-weight: 600; color: var(--accent);
  }
  .day-stat-lbl {
    font-size: 0.7rem; color: #8ca0b8;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ── GRID ── */
  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .subject-card {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .subject-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  }

  .card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .card-title { font-weight: 600; font-size: 0.95rem; color: var(--white); }
  .card-subtitle { font-size: 0.73rem; color: #8ca0b8; margin-top: 1px; }

  .card-badge {
    margin-left: auto; font-size: 0.68rem; font-weight: 600;
    padding: 3px 9px; border-radius: 99px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .badge-new { background: rgba(232,160,32,0.15); color: var(--accent); }
  .badge-rev { background: rgba(100,120,200,0.2); color: #9ab0e8; }

  /* Progress */
  .card-progress-wrap { padding: 14px 18px 0; }
  .progress-label {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-label span:first-child { font-size: 0.73rem; color: #8ca0b8; }
  .progress-label span:last-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.73rem; color: var(--accent); font-weight: 600;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.08);
    border-radius: 99px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    transition: width 0.5s ease; width: 0%;
  }

  /* Timer */
  .card-timer { padding: 14px 18px 18px; }
  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.9rem; font-weight: 600; color: var(--white);
    letter-spacing: 2px; line-height: 1; margin-bottom: 4px;
  }
  .timer-target {
    font-size: 0.72rem; color: #8ca0b8; margin-bottom: 14px;
  }

  .timer-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .btn {
    border: none; border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    padding: 8px 16px; transition: all 0.15s; letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-secondary { background: var(--bg-light); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Done button */
  .btn-complete {
    background: rgba(100,200,140,0.12);
    color: rgba(100,200,140,0.4);
    border: 1px solid rgba(100,200,140,0.15);
    margin-left: auto;
    cursor: not-allowed;
    position: relative;
  }
  .btn-complete.unlocked {
    background: rgba(80,190,130,0.2);
    color: #6dd9a8;
    border-color: rgba(80,190,130,0.35);
    cursor: pointer;
    animation: pulse-green 1.8s ease-in-out infinite;
  }
  .btn-complete.unlocked:hover {
    background: rgba(80,190,130,0.35);
    animation: none;
  }
  .btn-complete:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    animation: none;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(80,190,130,0.4); }
    50%       { box-shadow: 0 0 0 6px rgba(80,190,130,0); }
  }

  /* Lock hint */
  .lock-hint {
    font-size: 0.68rem;
    color: #8ca0b8;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    transition: opacity 0.3s;
  }
  .lock-hint.hidden { opacity: 0; pointer-events: none; }

  /* Completed state */
  .subject-card.completed .timer-display { color: #6dd9a8; }
  .completed-badge {
    display: none; align-items: center; gap: 6px;
    color: #6dd9a8; font-size: 0.78rem; font-weight: 600;
    margin-bottom: 10px;
  }
  .subject-card.completed .completed-badge { display: flex; }

  /* Subject colors */
  .s-history .card-icon { background: rgba(192,107,58,0.2); }
  .s-history .progress-bar-fill { background: #c06b3a; }
  .s-geo .card-icon { background: rgba(46,125,92,0.2); }
  .s-geo .progress-bar-fill { background: #2e7d5c; }
  .s-polity .card-icon { background: rgba(74,95,168,0.2); }
  .s-polity .progress-bar-fill { background: #4a5fa8; }
  .s-economy .card-icon { background: rgba(123,63,160,0.2); }
  .s-economy .progress-bar-fill { background: #7b3fa0; }
  .s-math .card-icon { background: rgba(192,57,43,0.2); }
  .s-math .progress-bar-fill { background: #c0392b; }
  .s-work .card-icon { background: rgba(41,128,185,0.2); }
  .s-work .progress-bar-fill { background: #2980b9; }

  .note-box {
    background: rgba(232,160,32,0.07);
    border: 1px solid rgba(232,160,32,0.18);
    border-radius: 10px; padding: 12px 16px;
    font-size: 0.78rem; color: #8ca0b8;
    margin-top: 18px; line-height: 1.6;
  }
  .note-box strong { color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--bg-light); border: 1px solid var(--border);
    color: var(--text); padding: 12px 20px;
    border-radius: 10px; font-size: 0.84rem; font-weight: 500;
    opacity: 0; transform: translateY(12px);
    transition: all 0.3s; z-index: 1000; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(109,217,168,0.4); color: #6dd9a8; }
  .toast.warn { border-color: rgba(232,160,32,0.4); color: var(--accent); }

  /* Analytics Panels */
  .analytics-container {
    margin-top: 24px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }
  .analytics-card {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .analytics-card h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .chart-wrapper {
    position: relative;
    width: 100%;
    height: 240px;
  }

  @media (max-width: 768px) {
    header { padding: 16px 16px 0; }
    main { padding: 16px 16px 40px; }
    .day-overview { flex-direction: column; align-items: flex-start; gap: 14px; }
    .subjects-grid { grid-template-columns: 1fr; }
    .analytics-container { grid-template-columns: 1fr; }
    .header-text h1 { font-size: 1.25rem; }
    .theme-grid { grid-template-columns: repeat(2,1fr); }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-theme="navy">

<div class="theme-panel" id="themePanel">
  <div class="theme-modal">
    <h3>Choose a Theme</h3>
    <p>Six monochromatic palettes — pick what keeps you focused.</p>
    <div class="theme-grid" id="themeGrid"></div>
    <button class="theme-close" onclick="closeTheme()">Close</button>
  </div>
</div>

<header>
  <div class="header-text">
    <h1>📚 UPSC Study Timetable</h1>
    <p>Continuous Overlap Method · Daily targets with timers</p>
  </div>
  <nav class="day-tabs" id="dayTabs"></nav>
  <button class="theme-btn" onclick="openTheme()">🎨 Theme</button>
</header>

<main>
  <div id="mainContent"></div>
  
  <div class="analytics-container">
    <div class="analytics-card">
      <h3>📈 Weekly Growth &amp; Target Tracking</h3>
      <div class="chart-wrapper">
        <canvas id="weeklyHoursChart"></canvas>
      </div>
    </div>
    <div class="analytics-card">
      <h3>🧩 Subject Distribution
        <button class="btn btn-secondary" style="padding: 2px 8px; font-size: 0.65rem;" onclick="resetAnalyticsData()">Reset All</button>
      </h3>
      <div class="chart-wrapper">
        <canvas id="subjectPieChart"></canvas>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── DATA SETUP ────────────────────────────────────────────────────────
const SUBJECTS = {
  history: { label:'History',        icon:'🏛️', cls:'s-history', color: '#c06b3a' },
  geo:     { label:'Geography',      icon:'🌍', cls:'s-geo',     color: '#2e7d5c' },
  polity:  { label:'Polity',         icon:'⚖️', cls:'s-polity',  color: '#4a5fa8' },
  economy: { label:'Economy',        icon:'📈', cls:'s-economy', color: '#7b3fa0' },
  math:    { label:'Mathematics',    icon:'🔢', cls:'s-math',    color: '#c0392b' },
  work:    { label:'Work / Writing', icon:'💼', cls:'s-work',    color: '#2980b9' },
};

const SCHEDULE = {
  Monday:    [{id:'history',mins:210,rev:false},{id:'geo',    mins:150,rev:false},{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
  Tuesday:   [{id:'geo',    mins:210,rev:false},{id:'polity', mins:150,rev:true },{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
  Wednesday: [{id:'polity', mins:210,rev:true },{id:'history',mins:150,rev:false},{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
  Thursday:  [{id:'history',mins:210,rev:false},{id:'economy',mins:150,rev:true },{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
  Friday:    [{id:'economy',mins:210,rev:true },{id:'geo',    mins:150,rev:false},{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
  Saturday:  [{id:'geo',    mins:210,rev:false},{id:'history',mins:150,rev:false},{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
  Sunday:    [{id:'history',mins:210,rev:false},{id:'polity', mins:150,rev:true },{id:'math',mins:60,rev:false},{id:'work',mins:60,rev:false}],
};

const DAYS = Object.keys(SCHEDULE);
const JS_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const todayName = JS_DAYS[new Date().getDay()];

// ── STATE ENGINE ──────────────────────────────────────────────────────
let state = {};
const savedState = localStorage.getItem('upsc_timetable_state');

if (savedState) {
  try {
    state = JSON.parse(savedState);
    DAYS.forEach(d => {
      if(!state[d]) state[d] = {};
      SCHEDULE[d].forEach(s => {
        if(!state[d][s.id]) state[d][s.id] = { elapsed: 0, running: false, completed: false, intervalId: null, startTime: null, baseElapsed: 0 };
        state[d][s.id].running = false;
        state[d][s.id].intervalId = null;
      });
    });
  } catch(e) { buildCleanState(); }
} else { buildCleanState(); }

function buildCleanState() {
  state = {};
  DAYS.forEach(d => {
    state[d] = {};
    SCHEDULE[d].forEach(s => {
      state[d][s.id] = { elapsed: 0, running: false, completed: false, intervalId: null, startTime: null, baseElapsed: 0 };
    });
  });
}

function saveStateToStorage() {
  localStorage.setItem('upsc_timetable_state', JSON.stringify(state));
}

let activeDay = todayName;

function getSubjectDistributionMetrics() {
  const totals = { History: 0, Geography: 0, Polity: 0, Economy: 0, Mathematics: 0, 'Work / Writing': 0 };
  DAYS.forEach(d => {
    SCHEDULE[d].forEach(s => {
      const label = SUBJECTS[s.id].label;
      const elapsedHrs = (state[d][s.id].elapsed || 0) / 3600;
      totals[label] += elapsedHrs;
    });
  });
  return totals;
}

// ── HELPERS ───────────────────────────────────────────────────────────
function fmt(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function pct(elapsed, targetMins) {
  return Math.min(100, Math.round((elapsed/(targetMins*60))*100));
}
function totalMins(day) { return SCHEDULE[day].reduce((a,s)=>a+s.mins,0); }
function elapsedTotal(day) { return SCHEDULE[day].reduce((a,s)=>a+state[day][s.id].elapsed,0); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>{ t.className='toast'; }, 3200);
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderTabs() {
  const nav = document.getElementById('dayTabs');
  if (!nav) return;
  nav.innerHTML = DAYS.map(d => `
    <button class="day-tab ${d===activeDay?'active':''} ${d===todayName?'today':''}"
            onclick="switchDay('${d}')">
      ${d===todayName?'⬤ ':''}${d.slice(0,3)}
    </button>
  `).join('');
}

function renderDay(day) {
  const totalT = totalMins(day);
  const elapsedS = elapsedTotal(day);
  const dayPct = pct(elapsedS, totalT);
  const circ = 2*Math.PI*36;
  const offset = circ - (dayPct/100)*circ;
  const remainM = Math.max(0, Math.ceil((totalT*60-elapsedS)/60));
  const doneCount = SCHEDULE[day].filter(s=>state[day][s.id].completed).length;

  return `
    <div id="view-${day}">
      <div class="day-overview">
        <div class="ring-wrap">
          <svg viewBox="0 0 90 90" width="88" height="88">
            <circle class="ring-bg" cx="45" cy="45" r="36"/>
            <circle class="ring-fill" id="ring-${day}" cx="45" cy="45" r="36"
              stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>
          </svg>
          <div class="ring-label">
            <span class="ring-pct" id="ringPct-${day}">${dayPct}%</span>
            <span class="ring-sub">done</span>
          </div>
        </div>
        <div class="day-overview-info">
          <h2>${day}${day===todayName?' — Today':''}</h2>
          <p>${SCHEDULE[day].length} sessions · ${Math.floor(totalT/60)}h${totalT%60?' '+totalT%60+'m':''} total</p>
          <div class="day-stats">
            <div class="day-stat">
              <span class="day-stat-val" id="stat-elapsed-${day}">${fmt(elapsedS)}</span>
              <span class="day-stat-lbl">Studied</span>
            </div>
            <div class="day-stat">
              <span class="day-stat-val" id="stat-remain-${day}">${remainM}m left</span>
              <span class="day-stat-lbl">Remaining</span>
            </div>
            <div class="day-stat">
              <span class="day-stat-val" id="stat-done-${day}">${doneCount}/${SCHEDULE[day].length}</span>
              <span class="day-stat-lbl">Completed</span>
            </div>
          </div>
        </div>
      </div>
      <div class="subjects-grid">
        ${SCHEDULE[day].map(s=>renderCard(day,s)).join('')}
      </div>
      <div class="note-box">
        <strong>💡 Continuous Overlap:</strong> Subject 1 (~3.5–4 hrs new content) · Subject 2 (~2.5–3 hrs, carries over as revision next day) · Math + Work/Writing (1 hr each, every day)
      </div>
    </div>`;
}

function renderCard(day, s) {
  const subj = SUBJECTS[s.id];
  const st = state[day][s.id];
  const p = pct(st.elapsed, s.mins);
  const isCompleted = st.completed;
  const isUnlocked = p >= 100 && !isCompleted;
  const targetLabel = s.mins>=60 ? Math.floor(s.mins/60)+'h'+(s.mins%60?` ${s.mins%60}m`:'') : s.mins+'m';

  return `
    <div class="subject-card ${subj.cls}${isCompleted?' completed':''}" id="card-${day}-${s.id}">
      <div class="card-header">
        <div class="card-icon">${subj.icon}</div>
        <div>
          <div class="card-title">${subj.label}${s.rev?' <span style="opacity:0.6;font-weight:400">(Rev.)</span>':''}</div>
          <div class="card-subtitle">Target: ${targetLabel}</div>
        </div>
        <span class="card-badge ${s.rev?'badge-rev':'badge-new'}">${s.rev?'Revision':'New'}</span>
      </div>
      <div class="card-progress-wrap">
        <div class="progress-label">
          <span>Progress toward target</span>
          <span id="pct-${day}-${s.id}">${p}%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="bar-${day}-${s.id}" style="width:${p}%"></div>
        </div>
      </div>
      <div class="card-timer">
        <div class="timer-display" id="timer-${day}-${s.id}">${fmt(st.elapsed)}</div>
        <div class="timer-target">Target: ${fmt(s.mins*60)} · <span id="remain-${day}-${s.id}">${fmt(Math.max(0,s.mins*60-st.elapsed))} remaining</span></div>
        <div class="completed-badge">✅ Session completed!</div>
        <div class="timer-controls">
          <button class="btn btn-primary" id="startBtn-${day}-${s.id}"
                  onclick="toggleTimer('${day}','${s.id}')" ${isCompleted?'disabled':''}>
            ${st.running?'⏸ Pause':'▶ Start'}
          </button>
          <button class="btn btn-secondary" id="resetBtn-${day}-${s.id}"
                  onclick="resetTimer('${day}','${s.id}')" ${isCompleted?'disabled':''}>
            ↺ Reset
          </button>
          <button class="btn btn-complete ${isUnlocked||isCompleted?'unlocked':''}"
                  id="doneBtn-${day}-${s.id}"
                  onclick="${isUnlocked?`markComplete('${day}','${s.id}')`:''}"
                  ${(isCompleted||!isUnlocked)?'disabled':''}>
            ${isCompleted?'✓ Done':'🔒 Done'}
          </button>
        </div>
        <div class="lock-hint ${(isUnlocked||isCompleted)?'hidden':''}" id="hint-${day}-${s.id}">
          🔒 Unlocks when timer reaches 100%
        </div>
      </div>
    </div>`;
}

function renderAll() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = DAYS.map(d =>
    `<div style="display:${d===activeDay?'block':'none'}" id="container-${d}">${renderDay(d)}</div>`
  ).join('');
  renderTabs();
}

// ── ACTIONS ───────────────────────────────────────────────────────────
function switchDay(day) {
  const prevContainer = document.getElementById('container-'+activeDay);
  if(prevContainer) prevContainer.style.display = 'none';
  activeDay = day;
  const nextContainer = document.getElementById('container-'+activeDay);
  if(nextContainer) nextContainer.style.display = 'block';
  renderTabs();
}

function toggleTimer(day, sid) {
  const st = state[day][sid];
  const s = SCHEDULE[day].find(x=>x.id===sid);
  
  if (st.running) {
    clearInterval(st.intervalId);
    st.baseElapsed = st.elapsed;
    st.running = false;
    const btn = document.getElementById(`startBtn-${day}-${sid}`);
    if(btn) btn.textContent = '▶ Start';
    saveStateToStorage();
    updateDashboardCharts();
  } else {
    st.running = true;
    st.startTime = Date.now();
    const btn = document.getElementById(`startBtn-${day}-${sid}`);
    if(btn) btn.textContent = '⏸ Pause';
    
    st.intervalId = setInterval(()=>{
      const dynamicMs = Date.now() - st.startTime;
      st.elapsed = st.baseElapsed + Math.floor(dynamicMs / 1000);

      if (st.elapsed >= s.mins * 60) {
        st.elapsed = s.mins * 60;
        clearInterval(st.intervalId);
        st.running = false;
        st.baseElapsed = st.elapsed;
        const sBtn = document.getElementById(`startBtn-${day}-${sid}`);
        if(sBtn) sBtn.textContent = '▶ Start';
        unlockDone(day, sid);
        showToast(`${SUBJECTS[sid].icon} ${SUBJECTS[sid].label} timer complete! Mark as Done to finish.`, 'warn');
      }

      updateCardUI(day, sid);
      updateDayUI(day);
    }, 200);
  }
}

function unlockDone(day, sid) {
  const btn = document.getElementById(`doneBtn-${day}-${sid}`);
  const hint = document.getElementById(`hint-${day}-${sid}`);
  if (btn) {
    btn.classList.add('unlocked');
    btn.disabled = false;
    btn.textContent = '✓ Done';
    btn.onclick = () => markComplete(day, sid);
  }
  if (hint) hint.classList.add('hidden');
  saveStateToStorage();
  updateDashboardCharts();
}

function resetTimer(day, sid) {
  const st = state[day][sid];
  if (st.running) clearInterval(st.intervalId);
  st.elapsed = 0; st.baseElapsed = 0; st.running = false; st.completed = false; st.startTime = null;
  updateCardUI(day, sid);
  updateDayUI(day);
  const card = document.getElementById(`card-${day}-${sid}`);
  if (card) card.classList.remove('completed');
  
  const startBtn = document.getElementById(`startBtn-${day}-${sid}`);
  const resetBtn = document.getElementById(`resetBtn-${day}-${sid}`);
  const doneBtn = document.getElementById(`doneBtn-${day}-${sid}`);
  const hint = document.getElementById(`hint-${day}-${sid}`);
  
  if (startBtn) { startBtn.disabled = false; startBtn.textContent = '▶ Start'; }
  if (resetBtn) resetBtn.disabled = false;
  if (doneBtn) { doneBtn.disabled = true; doneBtn.classList.remove('unlocked'); doneBtn.textContent = '🔒 Done'; doneBtn.onclick = null; }
  if (hint) hint.classList.remove('hidden');
  
  saveStateToStorage();
  updateDashboardCharts();
}

function markComplete(day, sid) {
  const st = state[day][sid];
  if (st.running) clearInterval(st.intervalId);
  st.running = false; st.completed = true; st.baseElapsed = st.elapsed;
  updateCardUI(day, sid);
  updateDayUI(day);
  const card = document.getElementById(`card-${day}-${sid}`);
  if (card) card.classList.add('completed');
  
  const startBtn = document.getElementById(`startBtn-${day}-${sid}`);
  const resetBtn = document.getElementById(`resetBtn-${day}-${sid}`);
  if (startBtn) startBtn.disabled = true;
  if (resetBtn) resetBtn.disabled = true;
  
  const doneBtn = document.getElementById(`doneBtn-${day}-${sid}`);
  if (doneBtn) { doneBtn.disabled = true; doneBtn.classList.remove('unlocked'); doneBtn.textContent = '✓ Done'; doneBtn.onclick = null; }
  
  const hint = document.getElementById(`hint-${day}-${sid}`);
  if (hint) hint.classList.add('hidden');
  
  showToast(`${SUBJECTS[sid].icon} ${SUBJECTS[sid].label} session complete! 🎉`, 'success');
  saveStateToStorage();
  updateDashboardCharts();
}

function updateCardUI(day, sid) {
  const st = state[day][sid];
  const s = SCHEDULE[day].find(x=>x.id===sid);
  const p = pct(st.elapsed, s.mins);
  const tEl = document.getElementById(`timer-${day}-${sid}`);
  const bEl = document.getElementById(`bar-${day}-${sid}`);
  const pEl = document.getElementById(`pct-${day}-${sid}`);
  const rEl = document.getElementById(`remain-${day}-${sid}`);
  
  if (tEl) tEl.textContent = fmt(st.elapsed);
  if (bEl) bEl.style.width = p+'%';
  if (pEl) pEl.textContent = p+'%';
  if (rEl) rEl.textContent = fmt(Math.max(0,s.mins*60-st.elapsed)) + ' remaining';
}

function updateDayUI(day) {
  const totalT = totalMins(day);
  const elapsedS = elapsedTotal(day);
  const dayPct = pct(elapsedS, totalT);
  const circ = 2*Math.PI*36;
  const offset = circ - (dayPct/100)*circ;
  const remainM = Math.max(0, Math.ceil((totalT*60-elapsedS)/60));
  const doneCount = SCHEDULE[day].filter(s=>state[day][s.id].completed).length;
  const ring = document.getElementById(`ring-${day}`);
  if (ring) {
    ring.style.strokeDashoffset = offset;
    const rp = document.getElementById(`ringPct-${day}`);
    if (rp) rp.textContent = dayPct+'%';
  }
  const se = document.getElementById(`stat-elapsed-${day}`);
  if (se) se.textContent = fmt(elapsedS);
  const sr = document.getElementById(`stat-remain-${day}`);
  if (sr) sr.textContent = remainM+'m left';
  const sd = document.getElementById(`stat-done-${day}`);
  if (sd) sd.textContent = `${doneCount}/${SCHEDULE[day].length}`;
}

// ── CHARTS ENGINE ──
let weeklyChartInstance = null;
let pieChartInstance = null;

function getTextColors() {
  return activeTheme === 'parchment' ? '#2a1a0a' : '#8ca0b8';
}

function initAnalyticsDashboards() {
  const cb = document.getElementById('weeklyHoursChart');
  const cp = document.getElementById('subjectPieChart');
  if (!cb || !cp) return;
  
  const ctxBar = cb.getContext('2d');
  const ctxPie = cp.getContext('2d');
  const textColor = getTextColors();

  weeklyChartInstance = new Chart(ctxBar, {
    type: 'bar',
    data: {
      labels: DAYS.map(d => d.slice(0,3)),
      datasets: [
        {
          label: 'Hours Logged',
          data: DAYS.map(d => (elapsedTotal(d) / 3600).toFixed(2)),
          backgroundColor: '#e8a020',
          borderRadius: 6
        },
        {
          label: 'Target Goal',
          data: DAYS.map(d => (totalMins(d) / 60).toFixed(2)),
          type: 'line',
          borderColor: 'rgba(255,255,255,0.25)',
          borderDash: [5, 5],
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: textColor, font: { family: 'Space Grotesk' } } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: textColor, font: { family: 'Space Grotesk' } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: textColor, font: { family: 'Space Grotesk' } }, title: { display: true, text: 'Hours', color: textColor } }
      }
    }
  });

  const pieData = getSubjectDistributionMetrics();
  pieChartInstance = new Chart(ctxPie, {
    type: 'doughnut',
    data: {
      labels: Object.keys(pieData),
      datasets: [{
        data: Object.values(pieData),
        backgroundColor: Object.keys(pieData).map(label => {
          const matchedKey = Object.keys(SUBJECTS).find(k => SUBJECTS[k].label === label);
          return SUBJECTS[matchedKey].color;
        }),
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { color: textColor, font: { family: 'Space Grotesk', size: 10 } } } }
    }
  });
}

function updateDashboardCharts() {
  if (!weeklyChartInstance || !pieChartInstance) return;
  weeklyChartInstance.data.datasets[0].data = DAYS.map(d => (elapsedTotal(d) / 3600).toFixed(2));
  weeklyChartInstance.update();

  const pieData = getSubjectDistributionMetrics();
  pieChartInstance.data.datasets[0].data = Object.values(pieData);
  pieChartInstance.update();
}

function updateChartColors() {
  if (!weeklyChartInstance || !pieChartInstance) return;
  const color = getTextColors();
  let accentColor = '#e8a020';
  if (activeTheme === 'forest') accentColor = '#5cbe7a';
  if (activeTheme === 'plum') accentColor = '#c084e8';
  if (activeTheme === 'slate') accentColor = '#7eb8d4';
  if (activeTheme === 'desert') accentColor = '#d4914a';
  if (activeTheme === 'parchment') accentColor = '#8b4513';

  weeklyChartInstance.data.datasets[0].backgroundColor = accentColor;
  weeklyChartInstance.options.plugins.legend.labels.color = color;
  weeklyChartInstance.options.scales.x.ticks.color = color;
  weeklyChartInstance.options.scales.y.ticks.color = color;
  weeklyChartInstance.options.scales.y.title.color = color;
  weeklyChartInstance.data.datasets[1].borderColor = activeTheme === 'parchment' ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.25)';
  pieChartInstance.options.plugins.legend.labels.color = color;
  
  weeklyChartInstance.update();
  pieChartInstance.update();
}

function resetAnalyticsData() {
  if(confirm("Are you sure you want to clear your logged hours and tracking for this week?")) {
    buildCleanState();
    saveStateToStorage();
    renderAll();
    updateDashboardCharts();
    showToast("All dashboard logs refreshed safely!", "success");
  }
}

// ── THEME ENGINES MODIFIED TO LOAD POST-INITIALIZATION ────────────────
function buildThemeGrid() {
  const grid = document.getElementById('themeGrid');
  if(!grid) return;
  grid.innerHTML = THEMES.map(t => `
    <div class="theme-swatch ${t.id === activeTheme ? 'active' : ''}"
         style="background:${t.dots[1]}; border-color:${t.id === activeTheme ? t.dots[2] : 'transparent'}"
         onclick="applyTheme('${t.id}')">
      <div class="swatch-dots">
        ${t.dots.map(d => `<div class="swatch-dot" style="background:${d}"></div>`).join('')}
      </div>
      <div class="swatch-name" style="color:${t.dotText}">${t.name}</div>
      <div class="swatch-sub" style="color:${t.dotText}">${t.sub}</div>
    </div>
  `).join('');
}

function applyTheme(id) {
  activeTheme = id;
  document.body.setAttribute('data-theme', id);
  localStorage.setItem('tt_theme', id);
  buildThemeGrid();
  if (weeklyChartInstance && pieChartInstance) {
    updateChartColors();
  }
}

function openTheme() { buildThemeGrid(); document.getElementById('themePanel').classList.add('open'); }
function closeTheme() { document.getElementById('themePanel').classList.remove('open'); }
document.getElementById('themePanel').addEventListener('click', function(e) { if (e.target === this) closeTheme(); });

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  renderAll();
  initAnalyticsDashboards();
  applyTheme(activeTheme); // Now safely runs AFTER dashboards have been fully built!
});
</script>
</body>
</html>
