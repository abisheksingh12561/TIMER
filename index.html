<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Timetable — UPSC Prep</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=300;400;500;600;700&family=JetBrains+Mono:wght=400;600&display=swap');

  /* ── THEMES ── */
  :root {
    --bg:         #0f1c2e;
    --bg-mid:     #1a2e48;
    --bg-light:   #243d5c;
    --accent:     #e8a020;
    --accent-dim: #c4881a;
    --text:       #f5f0e8;
    --muted:      #8ca0b8;
    --white:      #ffffff;
    --border:     rgba(255,255,255,0.08);
    --border-h:   rgba(255,255,255,0.07);
    --progress-track: rgba(255,255,255,0.08);
    --ring-track: rgba(255,255,255,0.1);
    --card-hover: rgba(255,255,255,0.03);
  }

  [data-theme="forest"] {
    --bg:         #0d1f17;
    --bg-mid:     #162b1e;
    --bg-light:   #1f3a28;
    --accent:     #5cbe7a;
    --accent-dim: #42a360;
    --text:       #e8f2eb;
    --muted:      #7aaa8a;
    --white:      #f0faf3;
    --border:     rgba(92,190,122,0.12);
    --border-h:   rgba(92,190,122,0.07);
    --progress-track: rgba(92,190,122,0.1);
    --ring-track: rgba(92,190,122,0.15);
    --card-hover: rgba(92,190,122,0.03);
  }

  [data-theme="parchment"] {
    --bg:         #f0e8d8;
    --bg-mid:     #e6dcc8;
    --bg-light:   #ddd0b8;
    --accent:     #8b4513;
    --accent-dim: #6b3410;
    --text:       #2a1a0a;
    --muted:      #7a6450;
    --white:      #2a1a0a;
    --border:     rgba(100,60,20,0.15);
    --border-h:   rgba(100,60,20,0.1);
    --progress-track: rgba(100,60,20,0.12);
    --ring-track: rgba(100,60,20,0.15);
    --card-hover: rgba(100,60,20,0.04);
  }

  [data-theme="slate"] {
    --bg:         #1a1e26;
    --bg-mid:     #242935;
    --bg-light:   #2e3545;
    --accent:     #7eb8d4;
    --accent-dim: #5a9ab8;
    --text:       #e2e8f0;
    --muted:      #7a8fa8;
    --white:      #f8fafc;
    --border:     rgba(126,184,212,0.1);
    --border-h:   rgba(126,184,212,0.07);
    --progress-track: rgba(126,184,212,0.1);
    --ring-track: rgba(126,184,212,0.12);
    --card-hover: rgba(126,184,212,0.03);
  }

  [data-theme="plum"] {
    --bg:         #1a0f2e;
    --bg-mid:     #261a3f;
    --bg-light:   #332550;
    --accent:     #c084e8;
    --accent-dim: #a060cc;
    --text:       #f0e8ff;
    --muted:      #9878b8;
    --white:      #faf5ff;
    --border:     rgba(192,132,232,0.12);
    --border-h:   rgba(192,132,232,0.07);
    --progress-track: rgba(192,132,232,0.1);
    --ring-track: rgba(192,132,232,0.15);
    --card-hover: rgba(192,132,232,0.03);
  }

  [data-theme="desert"] {
    --bg:         #1e160c;
    --bg-mid:     #2c2014;
    --bg-light:   #3a2c1c;
    --accent:     #d4914a;
    --accent-dim: #b87030;
    --text:       #f5ece0;
    --muted:      #a08060;
    --white:      #fff8f0;
    --border:     rgba(212,145,74,0.12);
    --border-h:   rgba(212,145,74,0.07);
    --progress-track: rgba(212,145,74,0.1);
    --ring-track: rgba(212,145,74,0.15);
    --card-hover: rgba(212,145,74,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg);
    padding: 24px 32px 0;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    border-bottom: 1px solid var(--border-h);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-text h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--white);
  }
  .header-text p {
    color: var(--muted);
    font-size: 0.82rem;
    margin-top: 3px;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .day-tab {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    padding: 8px 13px 12px;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .day-tab:hover { color: var(--white); }
  .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .day-tab.today { font-weight: 700; }

  /* Theme switcher button */
  .theme-btn {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    margin-bottom: 12px;
    align-self: flex-end;
  }
  .theme-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Theme panel */
  .theme-panel {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
  }
  .theme-panel.open { display: flex; }
  .theme-modal {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: min(440px, 92vw);
  }
  .theme-modal h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .theme-modal p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .theme-swatch {
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 12px 10px 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start;
  }
  .theme-swatch:hover { transform: translateY(-2px); }
  .theme-swatch.active { border-color: var(--accent); }
  .swatch-dots {
    display: flex;
    gap: 4px;
  }
  .swatch-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .theme-close {
    width: 100%;
    padding: 10px;
    background: var(--bg-light);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .theme-close:hover { color: var(--text); }

  /* ── MAIN ── */
  main { padding: 24px 32px 48px; max-width: 1200px; margin: 0 auto; }

  /* ── DAY OVERVIEW ── */
  .day-overview {
    display: flex;
    align-items: center;
    gap: 28px;
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 28px;
    margin-bottom: 24px;
  }

  .ring-wrap {
    position: relative;
    width: 88px; height: 88px;
    flex-shrink: 0;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--ring-track); stroke-width: 7; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }
  .ring-label {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.05rem; font-weight: 600;
    color: var(--white); line-height: 1;
  }
  .ring-sub {
    font-size: 0.58rem; color: var(--muted);
    margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px;
  }

  .day-overview-info h2 { font-size: 1.2rem; font-weight: 700; color: var(--white); }
  .day-overview-info > p { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }

  .day-stats { display: flex; gap: 22px; margin-top: 12px; flex-wrap: wrap; }
  .day-stat { display: flex; flex-direction: column; gap: 2px; }
  .day-stat-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem; font-weight: 600; color: var(--accent);
  }
  .day-stat-lbl {
    font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* ── GRID ── */
  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
  }

  /* ── CARD ── */
  .subject-card {
    background: var(--bg-mid);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .subject-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  }

  .card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .card-title { font-weight: 600; font-size: 0.95rem; color: var(--white); }
  .card-subtitle { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }

  .card-badge {
    margin-left: auto; font-size: 0.68rem; font-weight: 600;
    padding: 3px 9px; border-radius: 99px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .badge-new { background: rgba(232,160,32,0.15); color: var(--accent); }
  .badge-rev { background: rgba(100,120,200,0.2); color: #9ab0e8; }

  /* Progress */
  .card-progress-wrap { padding: 14px 18px 0; }
  .progress-label {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-label span:first-child { font-size: 0.73rem; color: var(--muted); }
  .progress-label span:last-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.73rem; color: var(--accent); font-weight: 600;
  }
  .progress-bar-bg {
    background: var(--progress-track);
    border-radius: 99px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    transition: width 0.5s ease; width: 0%;
  }

  /* Timer */
  .card-timer { padding: 14px 18px 18px; }
  .timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.9rem; font-weight: 600; color: var(--white);
    letter-spacing: 2px; line-height: 1; margin-bottom: 4px;
  }
  .timer-target {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 14px;
  }

  .timer-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .btn {
    border: none; border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
    padding: 8px 16px; transition: all 0.15s; letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: var(--accent-dim); }
  .btn-secondary { background: var(--bg-light); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Done button */
  .btn-complete {
    background: rgba(100,200,140,0.12);
    color: rgba(100,200,140,0.4);
    border: 1px solid rgba(100,200,140,0.15);
    margin-left: auto;
    cursor: not-allowed;
    position: relative;
  }
  .btn-complete.unlocked {
    background: rgba(80,190,130,0.2);
    color: #6dd9a8;
    border-color: rgba(80,190,130,0.35);
    cursor: pointer;
    animation: pulse-green 1.8s ease-in-out infinite;
  }
  .btn-complete.unlocked:hover {
    background: rgba(80,190,130,0.35);
    animation: none;
  }
  .btn-complete:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    animation: none;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(80,190,130,0.4); }
    50%       { box-shadow: 0 0 0 6px rgba(80,190,130,0); }
  }

  /* Lock hint */
  .lock-hint {
    font-size: 0.68rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    transition: opacity 0.3s;
  }
  .lock-hint.hidden { opacity: 0; pointer-events: none; }

  /* Completed state */
  .subject-card.completed .timer-display { color: #6dd9a8; }
  .completed-badge {
    display: none; align-items: center; gap: 6px;
    color: #6dd9a8; font-size: 0.78rem; font-weight: 600;
    margin-bottom: 10px;
  }
  .subject-card.completed .completed-badge { display: flex; }

  /* Subject colors */
  .s-history .card-icon { background
